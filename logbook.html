<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logbook</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e14;color:#e8e3f5;font-family:system-ui,sans-serif;font-size:14px;padding:12px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.logo{font-size:20px;font-weight:600;color:#e8e3f5}.logo b{color:#9b7ffe}
.sub{font-size:12px;color:#6b5e8a;margin-top:2px}
.hdr-btns{display:flex;gap:6px}
button{cursor:pointer;font-family:inherit;font-size:12px}
.btn{padding:6px 12px;border:1px solid #2e2650;border-radius:8px;background:#17151f;color:#a899cc;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#1e1a2e;border-color:#7c5cfc;color:#e8e3f5}
.btn-purple{background:#2a1f5c;border-color:#7c5cfc;color:#9b7ffe}
.btn-purple:hover{background:#3d2f80;color:#fff}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 4px;border:1px solid #2e2650;border-radius:10px;background:#17151f;color:#6b5e8a;font-size:11px;font-weight:600;text-align:center;line-height:1.4}
.tab .d{font-size:13px;display:block;margin-bottom:1px}
.tab.on{background:#2a1f5c;border-color:#7c5cfc;color:#9b7ffe}
.tab:hover:not(.on){border-color:#4a3d80;color:#a899cc}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.date-row span{font-size:12px;color:#6b5e8a}
input[type=date]{background:#17151f;border:1px solid #2e2650;border-radius:8px;color:#e8e3f5;font-size:12px;padding:5px 10px;font-family:inherit}
input[type=date]:focus{outline:none;border-color:#7c5cfc}
.ex-list{display:flex;flex-direction:column;gap:5px}
.ex{border:1px solid #2e2650;border-radius:12px;background:#17151f;overflow:hidden}
.ex.open{border-color:#7c5cfc;background:#1a1730}
.ex-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}
.ex-head:hover{background:#1e1a2e}
.ex.open .ex-head{background:transparent}
.num{width:22px;height:22px;border-radius:50%;background:#1e1a2e;border:1px solid #2e2650;font-size:10px;color:#6b5e8a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex.open .num{background:#3d2f80;border-color:#7c5cfc;color:#c4b0ff}
.ex-name{flex:1;font-size:13px;font-weight:500;color:#e8e3f5}
.pill{font-size:11px;color:#6b5e8a;background:#1e1a2e;border:1px solid #2e2650;padding:2px 7px;border-radius:6px;white-space:nowrap}
.last-kg{font-size:12px;color:#a899cc;white-space:nowrap}
.badge-up{font-size:11px;padding:2px 7px;border-radius:6px;background:#0d2818;color:#4ade80;white-space:nowrap}
.badge-dn{font-size:11px;padding:2px 7px;border-radius:6px;background:#2a0d0d;color:#f87171;white-space:nowrap}
.del-ex{background:transparent;border:none;color:#6b5e8a;padding:3px 5px;border-radius:6px}
.del-ex:hover{color:#f87171}
.chev{font-size:13px;color:#6b5e8a;transition:transform .2s;border:none;background:transparent;padding:0 2px}
.ex.open .chev{transform:rotate(180deg)}
.body{display:none;border-top:1px solid #2e2650;padding:14px;flex-direction:column;gap:12px}
.ex.open .body{display:flex}
.row2{display:flex;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:#6b5e8a;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg textarea{background:#0f0e14;border:1px solid #2e2650;border-radius:8px;color:#e8e3f5;font-size:13px;padding:6px 10px;font-family:inherit;width:100%}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#7c5cfc}
.fg textarea{resize:none}
.hist-lbl{font-size:11px;color:#6b5e8a;text-transform:uppercase;letter-spacing:.04em;margin-bottom:0}
.hentries{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.he{display:flex;align-items:center;gap:6px;background:#0f0e14;border:1px solid #2e2650;border-radius:8px;padding:7px 10px;flex-wrap:wrap}
.he .he-date-input{width:122px;flex-shrink:0;background:#17151f;border:1px solid #2e2650;border-radius:6px;color:#a899cc;font-size:11px;padding:3px 6px;font-family:inherit}
.he .he-date-input:focus{outline:none;border-color:#7c5cfc;color:#e8e3f5}
.he input{background:transparent;border:none;color:#e8e3f5;font-size:13px;font-family:inherit;padding:0 2px}
.he input:focus{outline:none;border-bottom:1px solid #7c5cfc}
.he .ikg{width:52px}
.he .ireps{width:70px}
.he .inote{flex:1;min-width:60px;color:#a899cc;font-size:12px}
.he .sep{color:#6b5e8a;font-size:12px;flex-shrink:0}
.he-del{background:transparent;border:none;color:#6b5e8a;font-size:13px;padding:2px 4px;border-radius:4px;flex-shrink:0}
.he-del:hover{color:#f87171}
.empty{font-size:12px;color:#6b5e8a;padding:4px 0}
.footer{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;align-items:center}
.hint{font-size:11px;color:#4a3d80;margin-left:auto}
</style>
</head>

var STORAGE_KEY='lb5';
var data={}, cur='upper1', openEx=null, histOrder={};

function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Ordena por data e remove entradas completamente vazias
function cleanAndSort(hist){
  return hist
    .filter(function(e){return e.kg||e.reps||e.note;})
    .sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
}

function load(){
  try{var r=localStorage.getItem(STORAGE_KEY);if(r)data=JSON.parse(r);}catch(e){}
  ['upper1','lower1','upper2','lower2'].forEach(function(s){
    if(!data[s]){data[s]=JSON.parse(JSON.stringify(SEED[s]));}
    if(!data[s].date)data[s].date=today();
  });
}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}

// prog e lastKg sempre ordenam por data para comparar corretamente
function sortedHist(h){
  return h.filter(function(e){return e.kg;}).sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
}

function prog(h){
  if(!h||h.length<2)return'';
  var s=sortedHist(h);
  if(s.length<2)return'';
  var a=parseFloat(s[s.length-1].kg||0),b=parseFloat(s[s.length-2].kg||0);
  if(!a||!b)return'';
  var d=a-b;
  if(d>0)return' <span class="badge-up">▲ +'+d.toFixed(1)+'kg</span>';
  if(d<0)return' <span class="badge-dn">▼ '+d.toFixed(1)+'kg</span>';
  return'';
}

function lastKg(h){
  if(!h||!h.length)return'';
  var s=sortedHist(h);
  if(!s.length)return'';
  return' <span class="last-kg">'+esc(s[s.length-1].kg)+'kg</span>';
}

function renderHist(hist,ei){
  if(!hist||!hist.length)return'<p class="empty">Nenhum registro ainda.</p>';
  var order=histOrder[ei]||'asc';
  // exibe na ordem escolhida mas usa índice real do array para edição
  var indices=[];
  for(var x=0;x<hist.length;x++)indices.push(x);
  if(order==='desc')indices=indices.slice().reverse();
  var out='';
  for(var j=0;j<indices.length;j++){
    var h=indices[j];
    var e=hist[h];
    out+='<div class="he">'
      +'<input type="date" class="he-date-input" value="'+esc(e.date||'')+'" onchange="updH('+ei+','+h+',\'date\',this.value)">'
      +'<input class="ikg" value="'+esc(e.kg||'')+'" placeholder="kg" onchange="updH('+ei+','+h+',\'kg\',this.value)">'
      +'<span class="sep">kg ×</span>'
      +'<input class="ireps" value="'+esc(e.reps||'')+'" placeholder="reps" onchange="updH('+ei+','+h+',\'reps\',this.value)">'
      +'<input class="inote" value="'+esc(e.note||'')+'" placeholder="obs..." onchange="updH('+ei+','+h+',\'note\',this.value)">'
      +'<button class="he-del" onclick="delH('+ei+','+h+')">✕</button>'
      +'</div>';
  }
  return out;
}

function render(){
  var s=data[cur];
  document.getElementById('dateInput').value=s.date;
  var exs=s.exercises, out='';
  for(var i=0;i<exs.length;i++){
    var ex=exs[i], open=(openEx===i);
    out+='<div class="ex'+(open?' open':'')+'">'
      +'<div class="ex-head" onclick="toggleEx('+i+')">'
      +'<div class="num">'+(i+1)+'</div>'
      +'<span class="ex-name">'+(esc(ex.name)||'<span style="color:#6b5e8a">sem nome</span>')+'</span>'
      +(ex.sr?'<span class="pill">'+esc(ex.sr)+'</span>':'')
      +lastKg(ex.history)+prog(ex.history)
      +'<button class="del-ex" onclick="event.stopPropagation();delEx('+i+')">🗑</button>'
      +'<span class="chev"></span>'
      +'</div>'
      +'<div class="body">'
      +'<div class="row2">'
      +'<div class="fg" style="flex:2"><label>Nome</label><input value="'+esc(ex.name)+'" placeholder="Nome" onchange="data[cur].exercises['+i+'].name=this.value;save()"></div>'
      +'<div class="fg" style="flex:1"><label>Séries × reps</label><input value="'+esc(ex.sr)+'" placeholder="4×8" onchange="data[cur].exercises['+i+'].sr=this.value;save()"></div>'
      +'</div>'
      +'<div class="fg"><label>Obs. fixas</label><textarea rows="2" onchange="data[cur].exercises['+i+'].obs=this.value;save()">'+esc(ex.obs)+'</textarea></div>'
      +'<div>'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<span class="hist-lbl">Histórico</span>'
      +'<button class="btn" style="font-size:10px;padding:2px 8px" id="obtn_'+i+'" onclick="toggleOrder('+i+')">'
      +((histOrder[i]||'asc')==='asc'?'↑ Mais antigo primeiro':'↓ Mais recente primeiro')
      +'</button>'
      +'</div>'
      +'<div class="hentries" id="hist_'+i+'">'+renderHist(ex.history,i)+'</div>'
      +'<button class="btn" style="font-size:11px;padding:4px 10px" onclick="addEntry('+i+')">+ Entrada</button>'
      +'</div>'
      +'</div>'
      +'</div>';
  }
  document.getElementById('exList').innerHTML=out;
}

function toggleOrder(i){
  histOrder[i]=(histOrder[i]||'asc')==='asc'?'desc':'asc';
  document.getElementById('hist_'+i).innerHTML=renderHist(data[cur].exercises[i].history,i);
  document.getElementById('obtn_'+i).textContent=histOrder[i]==='asc'?'↑ Mais antigo primeiro':'↓ Mais recente primeiro';
}
function toggleEx(i){openEx=(openEx===i?null:i);render();}
function setDate(v){data[cur].date=v;save();}
function updH(ei,h,f,v){data[cur].exercises[ei].history[h][f]=v;save();document.getElementById('hist_'+ei).innerHTML=renderHist(data[cur].exercises[ei].history,ei);}
function delH(ei,h){data[cur].exercises[ei].history.splice(h,1);save();document.getElementById('hist_'+ei).innerHTML=renderHist(data[cur].exercises[ei].history,ei);}
function addEntry(i){data[cur].exercises[i].history.push({date:data[cur].date,kg:'',reps:'',note:''});save();document.getElementById('hist_'+i).innerHTML=renderHist(data[cur].exercises[i].history,i);}
function addEx(){data[cur].exercises.push({name:'',sr:'',obs:'',history:[]});openEx=data[cur].exercises.length-1;save();render();}
function delEx(i){if(!confirm('Remover?'))return;data[cur].exercises.splice(i,1);openEx=null;save();render();}
function registerToday(){
  var d=data[cur].date;
  data[cur].exercises.forEach(function(ex){ex.history.push({date:d,kg:'',reps:'',note:''});});
  save();render();
}
function switchTab(s,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');cur=s;openEx=null;render();}
function exportData(){var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='logbook.json';a.click();}
function importData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{data=JSON.parse(ev.target.result);save();openEx=null;render();alert('Importado!');}catch(err){alert('Arquivo inválido.');}};r.readAsText(f);}

load();render();
</script>
</body>
</html>
