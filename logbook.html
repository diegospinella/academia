<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logbook</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e14;color:#e8e3f5;font-family:system-ui,sans-serif;font-size:14px;padding:12px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.logo{font-size:20px;font-weight:600;color:#e8e3f5}.logo b{color:#9b7ffe}
.sub{font-size:12px;color:#6b5e8a;margin-top:2px}
.hdr-btns{display:flex;gap:6px;align-items:center}
button{cursor:pointer;font-family:inherit;font-size:12px}
.btn{padding:6px 12px;border:1px solid #2e2650;border-radius:8px;background:#17151f;color:#a899cc;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#1e1a2e;border-color:#7c5cfc;color:#e8e3f5}
.btn-purple{background:#2a1f5c;border-color:#7c5cfc;color:#9b7ffe}
.btn-purple:hover{background:#3d2f80;color:#fff}
.save-indicator{font-size:11px;color:#4a3d80;display:flex;align-items:center;gap:4px;transition:color .3s}
.save-indicator.saving{color:#9b7ffe}
.save-indicator.saved{color:#4ade80}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 4px;border:1px solid #2e2650;border-radius:10px;background:#17151f;color:#6b5e8a;font-size:11px;font-weight:600;text-align:center;line-height:1.4}
.tab .d{font-size:13px;display:block;margin-bottom:1px}
.tab.on{background:#2a1f5c;border-color:#7c5cfc;color:#9b7ffe}
.tab:hover:not(.on){border-color:#4a3d80;color:#a899cc}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.date-row span{font-size:12px;color:#6b5e8a}
input[type=date]{background:#17151f;border:1px solid #2e2650;border-radius:8px;color:#e8e3f5;font-size:12px;padding:5px 10px;font-family:inherit}
input[type=date]:focus{outline:none;border-color:#7c5cfc}
/* Dashboard */
.dash{background:#17151f;border:1px solid #2e2650;border-radius:12px;padding:14px;margin-bottom:14px}
.dash-title{font-size:11px;color:#6b5e8a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.dash-legend{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#a899cc;cursor:pointer;padding:2px 6px;border-radius:6px;border:1px solid transparent}
.leg-item:hover{border-color:#2e2650}
.leg-item.off{opacity:.3}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dash-tip{position:fixed;background:#1e1a2e;border:1px solid #4a3d80;border-radius:8px;padding:7px 10px;font-size:12px;color:#e8e3f5;pointer-events:none;display:none;z-index:999;line-height:1.6;max-width:220px}
/* Exercicios */
.ex-list{display:flex;flex-direction:column;gap:5px}
.ex{border:1px solid #2e2650;border-radius:12px;background:#17151f;overflow:hidden}
.ex.open{border-color:#7c5cfc;background:#1a1730}
.ex-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}
.ex-head:hover{background:#1e1a2e}
.ex.open .ex-head{background:transparent}
.num{width:22px;height:22px;border-radius:50%;background:#1e1a2e;border:1px solid #2e2650;font-size:10px;color:#6b5e8a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex.open .num{background:#3d2f80;border-color:#7c5cfc;color:#c4b0ff}
.ex-name{flex:1;font-size:13px;font-weight:500;color:#e8e3f5}
.pill{font-size:11px;color:#6b5e8a;background:#1e1a2e;border:1px solid #2e2650;padding:2px 7px;border-radius:6px;white-space:nowrap}
.last-kg{font-size:12px;color:#a899cc;white-space:nowrap}
.badge-up{font-size:11px;padding:2px 7px;border-radius:6px;background:#0d2818;color:#4ade80;white-space:nowrap}
.badge-dn{font-size:11px;padding:2px 7px;border-radius:6px;background:#2a0d0d;color:#f87171;white-space:nowrap}
.del-ex{background:transparent;border:none;color:#6b5e8a;padding:3px 5px;border-radius:6px;font-size:13px}
.del-ex:hover{color:#f87171}
.chev{font-size:11px;color:#6b5e8a;border:none;background:transparent;padding:0 2px}
.body{display:none;border-top:1px solid #2e2650;padding:14px;flex-direction:column;gap:12px}
.ex.open .body{display:flex}
.row2{display:flex;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:#6b5e8a;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg textarea{background:#0f0e14;border:1px solid #2e2650;border-radius:8px;color:#e8e3f5;font-size:13px;padding:6px 10px;font-family:inherit;width:100%}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#7c5cfc}
.fg textarea{resize:none}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hist-lbl{font-size:11px;color:#6b5e8a;text-transform:uppercase;letter-spacing:.04em}
.hentries{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.he{display:flex;align-items:center;gap:6px;background:#0f0e14;border:1px solid #2e2650;border-radius:8px;padding:6px 8px;flex-wrap:wrap}
.he input[type=date]{background:#17151f;border:1px solid #2e2650;border-radius:6px;color:#a899cc;font-size:11px;padding:3px 6px;width:122px;flex-shrink:0;font-family:inherit}
.he input[type=date]:focus{border-color:#7c5cfc;color:#e8e3f5;outline:none}
.he .ikg{width:50px;background:transparent;border:none;color:#e8e3f5;font-size:13px;font-family:inherit;padding:0 2px}
.he .ireps{width:80px;background:transparent;border:none;color:#e8e3f5;font-size:13px;font-family:inherit;padding:0 2px}
.he .inote{flex:1;min-width:60px;background:transparent;border:none;color:#a899cc;font-size:12px;font-family:inherit;padding:0 2px}
.he input.ikg:focus,.he input.ireps:focus,.he input.inote:focus{outline:none;border-bottom:1px solid #7c5cfc}
.he .sep{color:#6b5e8a;font-size:12px;flex-shrink:0}
.he-del{background:transparent;border:none;color:#6b5e8a;font-size:12px;padding:2px 4px;border-radius:4px;flex-shrink:0}
.he-del:hover{color:#f87171}
.empty{font-size:12px;color:#6b5e8a;padding:4px 0}
.footer{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="logo">log<b>book</b></div>
    <div class="sub">Upper / Lower · 4x semana</div>
  </div>
  <div class="hdr-btns">
    <span class="save-indicator" id="saveInd">&#9679; salvo</span>
    <button class="btn" onclick="exportNow()">&#8595; Exportar</button>
    <button class="btn" onclick="document.getElementById('imp').click()">&#8593; Importar</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('upper1',this)"><span class="d">Segunda</span>Upper 1</button>
  <button class="tab" onclick="switchTab('lower1',this)"><span class="d">Terca</span>Lower 1</button>
  <button class="tab" onclick="switchTab('upper2',this)"><span class="d">Quinta</span>Upper 2</button>
  <button class="tab" onclick="switchTab('lower2',this)"><span class="d">Sexta</span>Lower 2</button>
</div>

<div class="date-row">
  <span>Data do treino:</span>
  <input type="date" id="dateInput" onchange="setDate(this.value)">
</div>

<div class="dash">
  <div class="dash-title">Progressao de carga</div>
  <canvas id="dashChart" style="width:100%;height:200px;display:block"></canvas>
  <div class="dash-legend" id="dashLegend"></div>
</div>
<div class="dash-tip" id="dashTip"></div>

<div class="ex-list" id="exList"></div>

<div class="footer">
  <button class="btn" onclick="addEx()">+ Exercicio</button>
  <button class="btn btn-purple" onclick="registerToday()">+ Registrar treino hoje</button>
</div>

var data = {}, cur = 'upper1', openEx = null, hiddenSeries = {};
var saveTimer = null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1];}

function load(){
  ['upper1','lower1','upper2','lower2'].forEach(function(s){
    data[s] = JSON.parse(JSON.stringify(SEED[s]));
    if(!data[s].date) data[s].date = today();
  });
}

// Autosave com debounce de 3s — baixa o JSON automaticamente
function triggerSave(){
  var ind = document.getElementById('saveInd');
  if(ind){ind.className='save-indicator saving';ind.innerHTML='&#9679; salvando...';}
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    exportNow(true);
    if(ind){ind.className='save-indicator saved';ind.innerHTML='&#10003; salvo';}
    setTimeout(function(){if(ind){ind.className='save-indicator';ind.innerHTML='&#9679; salvo';}},2000);
  }, 20000);
}

function exportNow(silent){
  var b = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'logbook.json';
  if(!silent){a.click();}
  else{
    // autosave silencioso so baixa se o usuario confirmar na primeira vez
    // na pratica apenas dispara o download
    a.click();
  }
}

function importData(e){
  var f = e.target.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(ev){
    try{
      data = JSON.parse(ev.target.result);
      ['upper1','lower1','upper2','lower2'].forEach(function(s){
        if(!data[s]) data[s] = JSON.parse(JSON.stringify(SEED[s]));
        if(!data[s].date) data[s].date = today();
      });
      openEx = null; hiddenSeries = {};
      render();
      alert('Importado!');
    }catch(err){alert('Arquivo invalido.');}
  };
  r.readAsText(f);
}

// ---- PROGRESS ----
function sortedHist(h){
  return (h||[]).filter(function(e){return e.kg;}).sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
}
function prog(h){
  var s=sortedHist(h); if(s.length<2)return'';
  var a=parseFloat(s[s.length-1].kg),b=parseFloat(s[s.length-2].kg);
  if(!a||!b)return''; var d=a-b;
  if(d>0)return' <span class="badge-up">&#9650; +'+d.toFixed(1)+'kg</span>';
  if(d<0)return' <span class="badge-dn">&#9660; '+d.toFixed(1)+'kg</span>';
  return'';
}
function lastKg(h){
  var s=sortedHist(h); if(!s.length)return'';
  return' <span class="last-kg">'+esc(s[s.length-1].kg)+'kg</span>';
}

// ---- DASHBOARD ----
var COLORS=['#9b7ffe','#4ade80','#f87171','#fbbf24','#38bdf8','#f472b6','#a3e635','#fb923c'];

function renderDashboard(){
  var exs = data[cur].exercises;
  var canvas = document.getElementById('dashChart');
  var legend = document.getElementById('dashLegend');
  if(!canvas) return;

  var datasets = [];
  for(var i=0;i<exs.length;i++){
    var pts = sortedHist(exs[i].history);
    if(pts.length) datasets.push({name:exs[i].name, pts:pts, idx:i});
  }

  // Legenda
  var lh='';
  for(var d=0;d<datasets.length;d++){
    var col=COLORS[d%COLORS.length];
    var off=hiddenSeries[datasets[d].idx]?' off':'';
    lh+='<div class="leg-item'+off+'" onclick="toggleSeries('+datasets[d].idx+')">'
      +'<div class="leg-dot" style="background:'+col+'"></div>'
      +esc(datasets[d].name)+'</div>';
  }
  legend.innerHTML=lh;

  var dpr=window.devicePixelRatio||1;
  var W=canvas.parentElement.offsetWidth-28;
  var H=200;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  var PAD={t:10,r:10,b:28,l:44};
  var cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;

  // Coletar datas e valores visiveis
  var allDates=[], allVals=[];
  for(var d=0;d<datasets.length;d++){
    if(hiddenSeries[datasets[d].idx]) continue;
    for(var p=0;p<datasets[d].pts.length;p++){
      var dt=datasets[d].pts[p].date;
      if(allDates.indexOf(dt)<0) allDates.push(dt);
      allVals.push(parseFloat(datasets[d].pts[p].kg));
    }
  }
  allDates.sort();

  if(!allDates.length){
    ctx.fillStyle='#6b5e8a';ctx.font='12px system-ui';ctx.textAlign='center';
    ctx.fillText('Nenhum dado ainda',W/2,H/2);return;
  }

  var minV=Math.min.apply(null,allVals), maxV=Math.max.apply(null,allVals);
  var rng=maxV-minV||1; minV-=rng*.1; maxV+=rng*.1; rng=maxV-minV;

  function xp(date){
    var i=allDates.indexOf(date);
    return PAD.l+(allDates.length>1?i/(allDates.length-1):0.5)*cW;
  }
  function yp(v){return PAD.t+cH-(v-minV)/rng*cH;}

  // Grid Y
  for(var yi=0;yi<=4;yi++){
    var yv=minV+rng*yi/4, ypv=yp(yv);
    ctx.strokeStyle='#2e2650';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,ypv);ctx.lineTo(PAD.l+cW,ypv);ctx.stroke();
    ctx.fillStyle='#6b5e8a';ctx.font='10px system-ui';ctx.textAlign='right';
    ctx.fillText(Math.round(yv)+'kg',PAD.l-4,ypv+3);
  }

  // Labels X
  var step=Math.ceil(allDates.length/6);
  ctx.fillStyle='#6b5e8a';ctx.font='10px system-ui';ctx.textAlign='center';
  for(var xi=0;xi<allDates.length;xi+=step){
    ctx.fillText(fmtD(allDates[xi]),xp(allDates[xi]),H-PAD.b+14);
  }

  // Linhas + pontos
  canvas._hits=[];
  for(var d=0;d<datasets.length;d++){
    if(hiddenSeries[datasets[d].idx]) continue;
    var col=COLORS[d%COLORS.length];
    var pts=datasets[d].pts;
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';
    ctx.beginPath();
    for(var p=0;p<pts.length;p++){
      var x=xp(pts[p].date),y=yp(parseFloat(pts[p].kg));
      p===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    for(var p=0;p<pts.length;p++){
      var x=xp(pts[p].date),y=yp(parseFloat(pts[p].kg));
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
      ctx.strokeStyle='#0f0e14';ctx.lineWidth=1.5;ctx.stroke();
      canvas._hits.push({x:x,y:y,name:datasets[d].name,kg:pts[p].kg,date:pts[p].date,reps:pts[p].reps});
    }
  }
}

function toggleSeries(idx){
  hiddenSeries[idx]=!hiddenSeries[idx];
  renderDashboard();
}

// Tooltip
(function(){
  var canvas=document.getElementById('dashChart');
  var tip=document.getElementById('dashTip');
  canvas.addEventListener('mousemove',function(e){
    var r=canvas.getBoundingClientRect();
    var mx=e.clientX-r.left,my=e.clientY-r.top;
    var hits=canvas._hits||[],best=null,bd=999;
    for(var i=0;i<hits.length;i++){
      var dx=hits[i].x-mx,dy=hits[i].y-my,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<bd&&dist<18){bd=dist;best=hits[i];}
    }
    if(best){
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-10)+'px';
      tip.innerHTML='<b>'+esc(best.name)+'</b><br>'+fmtD(best.date)+'<br>'+best.kg+'kg &times; '+esc(best.reps||'');
      canvas.style.cursor='crosshair';
    } else {
      tip.style.display='none';
      canvas.style.cursor='default';
    }
  });
  canvas.addEventListener('mouseleave',function(){tip.style.display='none';});
})();

function updHw(ei,h,f,v){data[cur].exercises[ei].history[h][f]=v;triggerSave();setTimeout(renderDashboard,0);}
function renderHist(hist,ei){
  if(!hist||!hist.length) return '<p class="empty">Nenhum registro ainda.</p>';
  var order=histOrder[ei]==='desc';
  var idx=[];
  for(var x=0;x<hist.length;x++) idx.push(x);
  if(order) idx=idx.slice().reverse();
  var out='';
  for(var j=0;j<idx.length;j++){
    var h=idx[j],e=hist[h];
    var ei2=ei,h2=h;
    out+='<div class="he">'
      +'<input type="date" value="'+esc(e.date||'')+'" data-ei="'+ei+'" data-h="'+h+'" data-f="date" onchange="updHw(+this.dataset.ei,+this.dataset.h,this.dataset.f,this.value)">'
      +'<input class="ikg" value="'+esc(e.kg||'')+'" placeholder="kg" data-ei="'+ei+'" data-h="'+h+'" data-f="kg" onchange="updHw(+this.dataset.ei,+this.dataset.h,this.dataset.f,this.value)">'
      +'<span class="sep">kg x</span>'
      +'<input class="ireps" value="'+esc(e.reps||'')+'" placeholder="reps" data-ei="'+ei+'" data-h="'+h+'" data-f="reps" onchange="updHw(+this.dataset.ei,+this.dataset.h,this.dataset.f,this.value)">'
      +'<input class="inote" value="'+esc(e.note||'')+'" placeholder="obs..." data-ei="'+ei+'" data-h="'+h+'" data-f="note" onchange="updHw(+this.dataset.ei,+this.dataset.h,this.dataset.f,this.value)">'
      +'<button class="he-del" data-ei="'+ei+'" data-h="'+h+'" onclick="delH(+this.dataset.ei,+this.dataset.h)">x</button>'
      +'</div>';
  }
  return out;
}

    var ex=exs[i],open=(openEx===i);

      +(ex.sr?'<span class="pill">'+esc(ex.sr)+'</span>':'')
      +lastKg(ex.history)+prog(ex.history)

      +'<span class="chev">'+(open?'▲':'▼')+'</span>'
      +'</div>'
      +'<div class="body">'
      +'<div class="row2">'
      +'<div class="fg" style="flex:2"><label>Nome</label><input value="'+esc(ex.name)+'" onchange="data[cur].exercises['+i+'].name=this.value;triggerSave()"></div>'
      +'<div class="fg" style="flex:1"><label>Series x reps</label><input value="'+esc(ex.sr)+'" onchange="data[cur].exercises['+i+'].sr=this.value;triggerSave()"></div>'
      +'</div>'
      +'<div class="fg"><label>Obs. fixas</label><textarea rows="2" onchange="data[cur].exercises['+i+'].obs=this.value;triggerSave()">'+esc(ex.obs)+'</textarea></div>'
      +'<div class="hist-hdr">'
      +'<span class="hist-lbl">Historico</span>'
      +'<button class="btn" style="font-size:10px;padding:2px 8px" id="obtn_'+i+'" onclick="toggleOrder('+i+')">'
      +((histOrder[i]==='desc')?'&#8595; Mais recente':'&#8593; Mais antigo')+'</button>'
      +'</div>'
      +'<div class="hentries" id="hist_'+i+'">'+renderHist(ex.history,i)+'</div>'
      +'<button class="btn" style="font-size:11px;padding:4px 10px" onclick="addEntry('+i+')">+ Entrada</button>'
      +'</div>'
      +'</div>';
  }
  document.getElementById('exList').innerHTML=out;
  setTimeout(renderDashboard,0);
}

function toggleOrder(i){
  histOrder[i]=(histOrder[i]==='desc')?'asc':'desc';
  document.getElementById('hist_'+i).innerHTML=renderHist(data[cur].exercises[i].history,i);
  document.getElementById('obtn_'+i).innerHTML=(histOrder[i]==='desc')?'&#8595; Mais recente':'&#8593; Mais antigo';
}
function toggleEx(i){openEx=(openEx===i?null:i);render();}
function setDate(v){data[cur].date=v;triggerSave();}

function delH(ei,h){data[cur].exercises[ei].history.splice(h,1);triggerSave();document.getElementById('hist_'+ei).innerHTML=renderHist(data[cur].exercises[ei].history,ei);setTimeout(renderDashboard,0);}
function addEntry(i){data[cur].exercises[i].history.push({date:data[cur].date,kg:'',reps:'',note:''});triggerSave();document.getElementById('hist_'+i).innerHTML=renderHist(data[cur].exercises[i].history,i);}
function addEx(){data[cur].exercises.push({name:'',sr:'',obs:'',history:[]});openEx=data[cur].exercises.length-1;triggerSave();render();}
function delEx(i){if(!confirm('Remover?'))return;data[cur].exercises.splice(i,1);openEx=null;triggerSave();render();}
function registerToday(){
  var d=data[cur].date;
  data[cur].exercises.forEach(function(ex){ex.history.push({date:d,kg:'',reps:'',note:''});});
  triggerSave();render();
}
function switchTab(s,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');cur=s;openEx=null;hiddenSeries={};render();
}
